<!DOCTYPE html>
<html>
<head>
    <title>Shift Roster</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">

    <!-- 🔥 SIDEBAR -->
    <div class="w-60 bg-white shadow-md h-screen p-4 fixed">

        <h2 class="text-xl font-bold mb-6 text-indigo-600">📊 NOC Panel</h2>

        <div class="space-y-2">
            <button id="navRoster" onclick="location.href='roster.html'" class="w-full text-left px-3 py-2 rounded hover:bg-gray-200">📅 Roster</button>

            <button id="navReports" onclick="location.href='reports.html'" class="w-full text-left px-3 py-2 rounded hover:bg-gray-200">📊 Reports</button>

            <button id="navEmployees" onclick="location.href='employees.html'" class="w-full text-left px-3 py-2 rounded hover:bg-gray-200">👥 Employees</button>

            <button id="navAdmin" onclick="location.href='admin.html'" class="w-full text-left px-3 py-2 rounded hover:bg-gray-200">🛠 Admin</button>
        </div>

        <hr class="my-4">

        <!-- 🔥 USER -->
        <div id="userLabel" class="text-sm text-gray-600 mb-2 hidden"></div>

        <button id="loginBtn" onclick="location.href='login.html'"
            class="w-full text-left px-3 py-2 rounded hover:bg-gray-200">
            🔐 Login
        </button>

        <button id="logoutBtn" onclick="logout()"
            class="w-full text-left px-3 py-2 rounded hover:bg-gray-200 hidden">
            🚪 Logout
        </button>

    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="ml-64 p-6 w-full">

        <!-- TOP BAR -->
        <div class="flex items-center gap-3 mb-4">

            <select id="monthSelect" class="border px-3 py-2 rounded"></select>

            <input id="yearSelect"
                   type="number"
                   class="border px-3 py-2 rounded w-28">

            <button onclick="loadRoster()"
                    class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
                Load
            </button>

            <span id="statusLabel" class="ml-4 font-semibold"></span>

        </div>

        <h2 class="text-2xl font-bold mb-4 text-gray-700">Shift Roster</h2>

        <!-- ACTION BAR -->
        <div class="flex gap-2 mb-4">

            <button onclick="undoLastChange()"
                    class="bg-gray-600 text-white px-3 py-2 rounded">
                Undo
            </button>

            <button onclick="redoLastChange()"
                    class="bg-gray-600 text-white px-3 py-2 rounded">
                Redo
            </button>

            <button onclick="finalizeRoster()"
                    class="bg-green-600 text-white px-3 py-2 rounded">
                Finalize
            </button>

            <button onclick="toggleAudit()"
                    class="bg-indigo-600 text-white px-3 py-2 rounded">
                Audit Logs
            </button>

        </div>

        <!-- 🔥 TABLE -->
        <div id="rosterTable" class="overflow-auto bg-white p-4 rounded shadow"></div>

    </div>

</div>

<!-- 🔥 AUDIT PANEL -->
<div id="auditOverlay" class="fixed inset-0 bg-black bg-opacity-20 hidden z-40"></div>

<div id="auditPanel"
     class="fixed right-0 top-0 h-full w-80 bg-white shadow-lg p-4 z-50 transform translate-x-full transition-transform duration-300">

    <h3 class="text-lg font-bold mb-3">Audit Logs</h3>
    <div id="auditContent"></div>

</div>

<script src="/static/js/app.js"></script>
<script>
    initSidebar("roster");
</script>
</body>
</html>
