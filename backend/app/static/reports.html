<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    .sidebar {
        z-index: 50;
    }
    </style>
</head>

<body class="bg-gray-100">

<div>

    <!-- SIDEBAR -->
    <div class="sidebar w-60 bg-white shadow-md h-screen p-4 fixed transition-all duration-300 overflow-hidden">

        <div class="flex flex-col items-center mb-6">
            <img src="/static/onmobile.png" class="h-10 w-auto object-contain mb-2">
            <h2 class="text-xl font-bold text-indigo-600">📊 NOC Panel</h2>
        </div>

        <div class="space-y-2">
            <button id="navRoster" onclick="location.href='roster.html'" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-200"><span>📅</span><span>Roster</span></button>

            <button id="navReports" onclick="location.href='reports.html'" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-200"><span>📊</span><span>Reports</span></button>

            <button id="navEmployees" onclick="location.href='employees.html'" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-200"><span>👥</span><span>Employees</span></button>

            <button id="navAdmin" onclick="location.href='admin.html'" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-200"><span>🛠</span><span>Admin</span></button>
        </div>

        <hr class="my-4">

        <!-- 🔥 USER -->
        <div id="userLabel" class="text-sm text-gray-600 mb-2 hidden"></div>

        <button id="loginBtn" onclick="location.href='login.html'"
            class="w-full text-left px-3 py-2 rounded hover:bg-gray-200">
            🔐 Login
        </button>

        <button id="logoutBtn" onclick="logout()"
            class="w-full text-left px-3 py-2 rounded hover:bg-gray-200 hidden">
            🚪 Logout
        </button>

    </div>

    <!-- MAIN -->
    <div class="main ml-64 p-6 w-full transition-all duration-300">

        <h2 class="text-2xl font-bold mb-6">Reports & Export</h2>

        <!-- EXPORT BOX -->
        <div class="bg-white p-4 rounded shadow mb-6 flex gap-3 items-center">

            <select id="monthSelect" class="border p-2 rounded"></select>

            <select id="yearSelect" class="border p-2 rounded">
                <script>
                    const year = new Date().getFullYear();
                    for (let i = year - 2; i <= year + 2; i++) {
                        document.write(`<option value="${i}">${i}</option>`);
                    }
                </script>
            </select>

            <button onclick="exportRoster()"
                class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                Export Excel
            </button>

            <button onclick="loadAuditLogs()"
                class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                View Audit Logs
            </button>

        </div>

        <!-- IMPORT BOX -->
        <div class="bg-white p-4 rounded shadow mb-6 flex gap-3 items-center">

            <input type="file" id="importFile" accept=".xlsx"
                class="border p-2 rounded">

            <button onclick="importRoster()"
                class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
                Import Excel
            </button>

        </div>

        <div class="bg-white p-4 rounded shadow mb-6">
            
            <button onclick="loadAllowanceReport()"
                class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
                Calculate Shift Allowance
            </button>

        </div>

        <div class="bg-white p-4 rounded shadow">
            <h3 class="text-lg font-bold mb-2">Shift Allowance</h3>

            <div class="overflow-auto">
                <table class="w-full border text-sm">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-2 border">Name</th>
                            <th class="p-2 border">Emp Code</th>
                            <th class="p-2 border">Email</th>
                            <th class="p-2 border">S1</th>
                            <th class="p-2 border">S2</th>
                            <th class="p-2 border">S3</th>
                            <th class="p-2 border">S1 ₹</th>
                            <th class="p-2 border">S2 ₹</th>
                            <th class="p-2 border">S3 ₹</th>
                            <th class="p-2 border">Grand Total</th>
                        </tr>
                    </thead>
                    <tbody id="allowanceBody"></tbody>
                </table>
            </div>

        </div>

        <div class="bg-white p-4 rounded shadow mt-4">
            <h3 class="text-lg font-bold mb-2">Audit Logs</h3>

            <div id="auditContent" class="max-h-[500px] overflow-y-auto text-sm"></div>
        </div>

    </div>

</div>

<script src="/static/js/app.js"></script>
<script>
    initSidebar("reports");
</script>
</body>
</html>
