<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-80">

        <div class="flex flex-col items-center mb-4">
            <img src="/static/onmobile.png" class="h-12 w-auto object-contain mb-2">
        </div>

        <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">
            NOC Login
        </h2>

        <input id="username"
               placeholder="Username"
               class="w-full mb-3 px-3 py-2 border rounded-md">

        <input id="password"
               type="password"
               placeholder="Password"
               class="w-full mb-4 px-3 py-2 border rounded-md">

        <button onclick="login()"
                class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700">
            Login
        </button>

    </div>

<script src="/static/js/app.js"></script>
</body>
</html>
